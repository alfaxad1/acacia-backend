name: Auto Deploy Acacia App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 1. Build the JAR file safely on GitHub's servers
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 2. Copy the generated JAR file directly to your VPS root folder
      - name: Copy JAR to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "target/acacia-*.jar"
          target: "/home/admin/acacia/"
          strip_components: 1

      # 3. Process the file and cycle the systemd service
      - name: Restart Application Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            
            cd /home/admin/acacia/
            
            echo "Processing deployment artifacts..."
            
            # Find any newly uploaded snapshot JAR file
            NEW_JAR=$(ls acacia-*.jar 2>/dev/null | head -n 1)
            
            if [ -n "$NEW_JAR" ]; then
                echo "Found newly uploaded artifact: $NEW_JAR"
                echo "Replacing production acacia.jar..."
                # Force overwrite the running jar with the new one
                mv -f "$NEW_JAR" acacia.jar
            elif [ -f "acacia.jar" ]; then
                echo "No new version uploaded, but an existing acacia.jar is present. Proceeding with restart..."
            else
                echo "Checking directory contents to diagnose missing file:"
                ls -la
                echo "ERROR: No deployable JAR file found!"
                exit 1
            fi
            
            # Double check cleaning up accidental target directories if scp misbehaved
            rm -rf target/
            
            # Ensure the admin user can read and execute the file
            chmod 700 acacia.jar
            
            echo "Restarting acacia.service..."
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S systemctl restart acacia.service
            
            echo "Waiting for service to become active..."
            for i in {1..12}; do
              STATUS=$(systemctl is-active acacia.service || true)
              if [ "$STATUS" = "active" ]; then
                echo "Service is active and deployment successful!"
                exit 0
              fi
              echo "Status: $STATUS. Waiting 5s..."
              sleep 5
            done
            
            echo "ERROR: Service did not become active in time."
            systemctl status acacia.service || true
            exit 1
