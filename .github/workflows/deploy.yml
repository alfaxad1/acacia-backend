name: Auto Deploy Acacia App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Navigate to project directory
            cd /home/admin/acacia.co.ke/

            # Pull latest changes
            git pull origin main

            # Build the application on the server
            mvn clean package -DskipTests

            # Restart the service
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S systemctl restart acacia.service
            
            # Verify status
            sudo systemctl is-active acacia.service
            echo "Deployment successful."